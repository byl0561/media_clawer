server {
    listen 8080;

    include /etc/nginx/auth.conf*;

    location / {
        root /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://localhost:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable nginx buffering so events are flushed immediately.
        # The upstream also sets X-Accel-Buffering: no per response, but
        # disabling it here avoids any per-response overhead.
        proxy_buffering off;

        # Long timeouts for the initial cold-cache diff; SSE heartbeats
        # keep connections alive well within these windows.
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
