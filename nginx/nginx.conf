server {
    listen 8080;

    location / {
        root /usr/share/nginx/html;
        index  index.html index.htm;
        # SPA history-mode fallback (vue-router)
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://localhost:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A cold-cache diff (full NAS scan + crawl) can run long; align with
        # gunicorn --timeout 300 and the frontend axios 300s timeout, else
        # nginx's default 60s proxy_read_timeout would 504 first.
        proxy_connect_timeout 5s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
